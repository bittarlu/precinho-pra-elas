<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precinho pra Elas 🛍️</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#fce4ec 0%,#f8bbd0 60%,#fce4ec 100%);
    min-height:100vh;display:flex;justify-content:center;
    align-items:flex-start;padding:40px 16px 60px;
  }
  .container{width:100%;max-width:480px}
  .header{text-align:center;margin-bottom:28px}
  .avatar{
    width:88px;height:88px;border-radius:50%;
    background:linear-gradient(135deg,#e91e63,#f06292);
    display:flex;align-items:center;justify-content:center;
    font-size:40px;margin:0 auto 14px;
    box-shadow:0 4px 16px rgba(233,30,99,.30);
  }
  h1{font-size:22px;font-weight:700;color:#880e4f;margin-bottom:4px}
  .subtitle{font-size:14px;color:#ad1457;opacity:.85}
  .link-card{
    display:flex;align-items:center;justify-content:space-between;
    background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;
    text-decoration:none;color:#4a1942;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
    border:1.5px solid rgba(233,30,99,.12);
    transition:transform .15s,box-shadow .15s;
  }
  .link-card:active{transform:scale(.98)}
  .thumb{
    width:56px;height:56px;border-radius:10px;
    object-fit:cover;margin-right:12px;flex-shrink:0;
  }
  .link-title{font-size:15px;font-weight:600;line-height:1.4;flex:1;padding-right:8px}
  .badge{
    background:linear-gradient(135deg,#e91e63,#c2185b);color:#fff;
    font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;
    white-space:nowrap;flex-shrink:0;
  }
  .empty{text-align:center;color:#ad1457;padding:40px 0;font-size:15px;opacity:.7}
  .footer{text-align:center;font-size:11px;color:#c2185b;margin-top:20px;opacity:.5}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">🛍️</div>
    <h1>Precinho pra Elas</h1>
    <p class="subtitle">Melhores ofertas do dia ✨</p>
  </div>
    <p class="empty">Nenhuma oferta no momento. Volte logo! 💕</p>
  <p class="footer">Atualizado em 21/05/2026 14:27 UTC</p>
</div>
</body>
</html>
